name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  e2e:
    name: E2E (WSL2 + RTX 4080)
    runs-on: self-hosted
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install modelbench
        run: pip install -e .

      - name: Check Ollama is available
        run: ollama --version

      - name: Run benchmark (llama3.2:3b)
        run: modelbench run llama3.2:3b

      - name: Show stored results
        run: modelbench show llama3.2:3b
